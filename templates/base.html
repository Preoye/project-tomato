<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10234d">
  <title>{% block title %}A Little Journey to July 23{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=DM+Sans:wght@400;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="sky" aria-hidden="true"><div class="stars"></div><div class="moon"></div></div>
  <main>{% block content %}{% endblock %}</main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
